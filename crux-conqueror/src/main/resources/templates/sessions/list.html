<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>My Training Sessions</title>
</head>
<body>
  <div th:replace="fragments/navbar :: body"></div>
  <h1>My training sessions</h1>
  <p>
    <a th:href="@{/sessions/new}">Log a new session</a> |
    <a th:href="@{/}">Home</a>
  </p>

  <div th:if="${#lists.isEmpty(sessions)}">
    <p>No sessions logged yet.</p>
  </div>

  <div th:if="${!#lists.isEmpty(sessions)}">
    <table border="1" cellpadding="6">
      <thead>
        <tr>
          <th>Date</th>
          <th>Type</th>
          <th>Duration</th>
          <th>Intensity</th>
          <th>Highest grade</th>
          <th>Attempts</th>
          <th>Tops</th>
          <th>Flashes</th>
          <th>Notes</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="s : ${sessions}">
          <td th:text="${s.sessionDate}"></td>
          <td th:text="${s.sessionType}"></td>
          <td th:text="${s.durationMinutes} + ' min'"></td>
          <td th:text="${s.intensity}"></td>
          <td th:text="${s.highestGrade} ?: '-'"></td>
          <td th:text="${s.attemptsTotal}"></td>
          <td th:text="${s.topsTotal}"></td>
          <td th:text="${s.flashesTotal}"></td>
          <td th:text="${s.notes} ?: '-'"></td>
        </tr>
      </tbody>
    </table>
  </div>
</body>
</html>
