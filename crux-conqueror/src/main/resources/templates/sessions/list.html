<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>My Training Sessions</title>
</head>
<body>
  <div th:replace="fragments/navbar :: body"></div>
  <h1>My training sessions</h1>
<p>
  <a th:href="@{/sessions/new}">Log a new session</a> |
  <a th:href="@{/}">Home</a> |
  <a th:if="${!showArchived}" th:href="@{/sessions(showArchived=true)}">Show archived</a>
  <a th:if="${showArchived}" th:href="@{/sessions}">Show active</a>
</p>

  <div th:if="${#lists.isEmpty(sessions)}">
    <p>No sessions logged yet.</p>
  </div>

<div th:if="${!#lists.isEmpty(sessions)}">

  <form method="post">

    <button type="submit"
            formaction="/sessions/bulk-archive">
      Archive selected
    </button>

    <button type="submit"
            formaction="/sessions/bulk-delete"
            onclick="return confirm('Delete selected sessions?');">
      Delete selected
    </button>

    <br/><br/>

    <table border="1" cellpadding="6">
<thead>
  <tr>
    <th>Select</th>
    <th>Date</th>
    <th>Type</th>
    <th>Duration</th>
    <th>Intensity</th>
    <th>Highest grade</th>
    <th>Attempts</th>
    <th>Tops</th>
    <th>Flashes</th>
    <th>Notes</th>
    <th>Actions</th>
  </tr>
</thead>
      <tbody>
<tr th:each="s : ${sessions}">

  <td>
    <input type="checkbox" name="ids" th:value="${s.id}" />
  </td>

  <td th:text="${s.sessionDate}"></td>
  <td th:text="${s.sessionType}"></td>
  <td th:text="${s.durationMinutes} + ' min'"></td>
  <td th:text="${s.intensity}"></td>
  <td th:text="${s.highestGrade} ?: '-'"></td>
  <td th:text="${s.attemptsTotal}"></td>
  <td th:text="${s.topsTotal}"></td>
  <td th:text="${s.flashesTotal}"></td>
  <td th:text="${s.notes} ?: '-'"></td>

  <td>
    <!-- Edit -->
    <a th:href="@{'/sessions/' + ${s.id} + '/edit'}">Edit</a>

    <!-- Delete -->
    <form th:action="@{'/sessions/' + ${s.id} + '/delete'}"
          method="post"
          style="display:inline;">
      <button type="submit"
              onclick="return confirm('Delete this session?');">
        Delete
      </button>
    </form>

    <!-- Archive -->
    <form th:if="${!showArchived}"
          th:action="@{'/sessions/' + ${s.id} + '/archive'}"
          method="post"
          style="display:inline;">
      <button type="submit">Archive</button>
    </form>

    <!-- Unarchive -->
    <form th:if="${showArchived}"
          th:action="@{'/sessions/' + ${s.id} + '/unarchive'}"
          method="post"
          style="display:inline;">
      <button type="submit">Unarchive</button>
    </form>
  </td>

</tr>
      </tbody>
    </table>
   </form>
  </div>
</body>
</html>
