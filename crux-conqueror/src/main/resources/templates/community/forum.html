<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Community Forum</title>
  <link rel="stylesheet" th:href="@{/css/navbar.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: body}"></div>

<h1>Community Forum</h1>

<h2>Create a post</h2>
<form th:action="@{/community}" th:object="${newPost}" method="post">
  <label>
    Title:
    <input type="text" th:field="*{title}" maxlength="120" required />
  </label>
  <br/><br/>

  <label>
    Content:
    <br/>
    <textarea th:field="*{content}" rows="4" cols="60" required></textarea>
  </label>
  <br/><br/>

  <button type="submit">Post</button>
</form>

<hr/>

<h2>Recent posts</h2>

<div th:if="${#lists.isEmpty(posts)}">
  <p>No posts yet. Be the first!</p>
</div>

<div th:if="${!#lists.isEmpty(posts)}">
  <table border="1" cellpadding="6">
    <thead>
      <tr>
        <th>Title</th>
        <th>Author</th>
        <th>Created</th>
        <th>Content</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="p : ${posts}">
        <td th:text="${p.title}"></td>
        <td th:text="${p.user.username}"></td>
        <td th:text="${#temporals.format(p.createdAt, 'dd MMM yyyy HH:mm')}"></td>
        <td th:text="${p.content}"></td>
      </tr>
    </tbody>
  </table>
</div>

</body>
</html>
